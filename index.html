<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Guess Arcade</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}
#ui {
  position: absolute;
  top: 20px;
  left: 20px;
  background: rgba(0,0,0,0.7);
  padding: 15px;
  border-radius: 12px;
  z-index: 10;
}
button {
  padding: 6px 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
}
input {
  background: black;
  color: white;
  border: 1px solid white;
  text-align: center;
  width: 60px;
  padding: 4px;
  border-radius: 6px;
}
svg { position:absolute; top:0; left:0; }
</style>
</head>
<body>

<svg id="map"></svg>

<div id="ui"></div>

<script>
const svg = document.getElementById('map');
const ui = document.getElementById('ui');
const width = window.innerWidth;
const height = window.innerHeight;
svg.setAttribute('width', width);
svg.setAttribute('height', height);

let countries = [];
let current = null;
let round = 0;
let totalRounds = 5;
let score = 0;
let leaderboard = JSON.parse(localStorage.getItem('geoLeaderboard') || '[]');

function projection([lon, lat]) {
  const x = (lon + 180) * (width / 360);
  const y = (90 - lat) * (height / 180);
  return [x, y];
}

function geoDistanceMiles(a, b) {
  const R = 3958.8;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b[1] - a[1]);
  const dLon = toRad(b[0] - a[0]);
  const lat1 = toRad(a[1]);
  const lat2 = toRad(b[1]);
  const h = Math.sin(dLat/2)**2 + Math.cos(lat1)*Math.cos(lat2)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(h), Math.sqrt(1-h));
}

function randomCountry() {
  return countries[Math.floor(Math.random() * countries.length)];
}

function drawMap(data) {
  countries = data.features;
  countries.forEach((c, i) => {
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    const coords = c.geometry.coordinates;
    let d = '';

    function drawPolygon(poly) {
      poly.forEach(ring => {
        ring.forEach((pt, idx) => {
          const [x,y] = projection(pt);
          d += (idx===0?'M':'L') + x + ' ' + y + ' ';
        });
        d += 'Z ';
      });
    }

    if (c.geometry.type === 'Polygon') drawPolygon(coords);
    if (c.geometry.type === 'MultiPolygon') coords.forEach(drawPolygon);

    path.setAttribute('d', d);
    path.setAttribute('fill', `hsl(${i*15%360},60%,50%)`);
    path.setAttribute('stroke', '#111');
    svg.appendChild(path);
  });
}

svg.addEventListener('click', e => {
  if (!current) return;
  const rect = svg.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const lon = x / (width/360) - 180;
  const lat = 90 - y / (height/180);
  const centroid = current.properties.centroid;
  score += geoDistanceMiles([lon,lat], centroid);

  if (round >= totalRounds) endGame();
  else nextRound();
});

function startGame() {
  score = 0;
  round = 1;
  nextRound();
}

function nextRound() {
  current = randomCountry();
  round++;
  renderUI();
}

function endGame() {
  current = null;
  renderUI(true);
}

function submitScore() {
  const name = document.getElementById('nameInput').value.toUpperCase();
  if (name.length !== 3) return;
  leaderboard.push({name, score: Math.round(score)});
  leaderboard.sort((a,b)=>a.score-b.score);
  leaderboard = leaderboard.slice(0,10);
  localStorage.setItem('geoLeaderboard', JSON.stringify(leaderboard));
  renderUI(true);
}

function renderUI(gameOver=false) {
  if (!current && !gameOver) {
    ui.innerHTML = `<button onclick="startGame()">Start Game</button>`;
    return;
  }

  if (!gameOver) {
    ui.innerHTML = `
      <div>Locate:</div>
      <div><strong>${current.properties.name}</strong></div>
      <div>Round ${round-1} / ${totalRounds}</div>
      <div>Total Miles: ${Math.round(score)}</div>
    `;
  } else {
    ui.innerHTML = `
      <div><strong>Game Over</strong></div>
      <div>Final Score: ${Math.round(score)}</div>
      <input id="nameInput" maxlength="3" placeholder="AAA" />
      <button onclick="submitScore()">Submit</button>
      <div style="margin-top:10px"><strong>Leaderboard</strong></div>
      ${leaderboard.map((e,i)=>`<div>${i+1}. ${e.name} — ${e.score}</div>`).join('')}
      <button onclick="startGame()" style="margin-top:10px">Play Again</button>
    `;
  }
}

fetch('https://raw.githubusercontent.com/holtzy/D3-graph-gallery/master/DATA/world.geojson')
  .then(res=>res.json())
  .then(data=>{
    data.features.forEach(f=>{
      const coords = f.geometry.coordinates;
      let lonSum=0, latSum=0, count=0;
      function collect(poly){
        poly.forEach(r=>r.forEach(p=>{lonSum+=p[0]; latSum+=p[1]; count++;}));
      }
      if(f.geometry.type==='Polygon') collect(coords);
      if(f.geometry.type==='MultiPolygon') coords.forEach(collect);
      f.properties.centroid=[lonSum/count, latSum/count];
    });
    drawMap(data);
    renderUI();
  });
</script>

</body>
</html>
